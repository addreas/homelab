name: build-images

on:
  push:
    branches:
      - 'main'
    paths:
      - '**/*.Dockerfile'

jobs:
  find:
    runs-on: ubuntu-latest

    outputs:
      dockerfiles: ${{ steps.find.outputs.dockerfiles}}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: find
        name: Find changed Dockerfiles
        run: |
          files=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- '*.Dockerfile'| jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "dockerfiles=$files" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs:
    - find
    strategy:
      matrix:
        dockerfile: ${{ fromJSON(needs.find.outputs.dockerfiles) }}

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup env
        shell: bash
        script: |
          DOCKERFILE_PATH="${{ matrix.dockerfile }}"
          DOCKERFILE_DIR="$(dirname "$DOCKERFILE_PATH")"

          FROM_VERSION="$(grep FROM "$DOCKERFILE_PATH" | sed -E 's/^FROM .*:([^@ ]+).*/\1/')"
          DOCKERFILE_NAME_PREFIX="$(basename "$DOCKERFILE_PATH" .Dockerfile)"

          echo "DOCKERFILE_PATH=$DOCKERFILE_PATH" >> $GITHUB_ENV
          echo "DOCKERFILE_DIR=$DOCKERFILE_DIR" >> $GITHUB_ENV
          echo "FROM_VERSION=$FROM_VERSION" >> $GITHUB_ENV
          echo "DOCKERFILE_NAME_PREFIX=$DOCKERFILE_NAME_PREFIX" >> $GITHUB_ENV


      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ env.DOCKERFILE_NAME_PREFIX }}:${{ env.FROM_VERSION }}
          context: ${{ env.DOCKERFILE_DIR }}
          file: ${{ env.DOCKERFILE_PATH }}
