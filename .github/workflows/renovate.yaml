
name: Renovate
on:
  schedule:
    - cron: '30 14 1 * *'
  workflow_dispatch:
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Node
        uses: actions/setup-node@v6
      - run: npx renovate
