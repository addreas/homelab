machine:
  kubelet:
    defaultRuntimeSeccompProfileEnabled: true
    disableManifestsDirectory: true

  install:
    disk: /dev/nvme0n1
    wipe: true

  features:
    diskQuotaSupport: true
    kubePrism:
      enabled: true
      port: 7445

    hostDNS:
      enabled: true
      forwardKubeDNSToHost: false # cilium issue: https://github.com/siderolabs/talos/pull/9200
